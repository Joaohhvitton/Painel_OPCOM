<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>N3 Ops · Painel de Atendimentos</title>
  <link rel="icon" type="image/png" href="favicon-32x32-removebg-preview.png">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="root"></div>

<!-- ══ REACT ══ -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<!-- ══ CHART.JS ══ -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

<!-- ══ SWEETALERT2 ══ -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>

<!-- ══ BABEL (transpila JSX inline) ══ -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- ══ VERIFICAÇÃO DE LIBS ══ -->
<script>
  (function() {
    var missing = [];
    if (!window.React)    missing.push('React');
    if (!window.ReactDOM) missing.push('ReactDOM');
    if (!window.Chart)    missing.push('Chart.js');
    if (!window.Swal)     missing.push('SweetAlert2');
    if (!window.Babel)    missing.push('Babel');
    if (missing.length) {
      document.getElementById('root').innerHTML =
        '<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;font-family:system-ui;background:#07070D;color:#F0F0FA">' +
        '<span style="font-size:2rem">⚠️</span>' +
        '<h3 style="font-size:1rem">Falha ao carregar dependências</h3>' +
        '<p style="font-size:.8rem;color:#A0A0BE;text-align:center;max-width:400px">Não foi possível carregar: <strong>' + missing.join(', ') + '</strong>.<br>Verifique sua conexão com a internet ou coloque as libs na pasta <code>libs/</code>.</p>' +
        '<button onclick="location.reload()" style="padding:8px 18px;background:#4ECDC4;color:#07070D;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:.85rem">Tentar novamente</button>' +
        '</div>';
    }
  })();
</script>

<!-- ══ APP (JSX transpilado pelo Babel) ══ -->
<script type="text/babel" src="app.js" data-presets="react"></script>

</body>
</html>
