<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>N3 Ops · Painel de Atendimentos</title>
  <link rel="icon" type="image/png" href="favicon-32x32-removebg-preview.png">
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Loader inicial — independente do styles.css */
    .init-loader {
      display:flex; align-items:center; justify-content:center;
      height:100vh; flex-direction:column; gap:14px;
      font-family:system-ui,-apple-system,sans-serif;
      background:#07070D; color:#A0A0BE; padding:20px; text-align:center;
    }
    .init-loader .ring {
      width:32px; height:32px;
      border:2px solid rgba(255,255,255,.08);
      border-top-color:#4ECDC4;
      border-radius:50%;
      animation:initspin .7s linear infinite;
    }
    .init-loader .status {
      font-size:.72rem; letter-spacing:.1em;
      text-transform:uppercase; font-weight:600;
    }
    .init-loader .substatus {
      font-size:.62rem; color:#5E5E80;
      font-family:Consolas,'Courier New',monospace;
    }
    @keyframes initspin { to { transform:rotate(360deg) } }
  </style>
</head>
<body>
<div id="root">
  <div class="init-loader">
    <div class="ring"></div>
    <div class="status" id="loader-status">Inicializando…</div>
    <div class="substatus" id="loader-substatus"></div>
  </div>
</div>

<!-- ══ DEPENDÊNCIAS (CDN) ══ -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- ══ LOADER MANUAL (com progresso visível em cada etapa) ══ -->
<script>
(async function() {
  const root = document.getElementById('root');

  const setStatus = (main, sub = '') => {
    const m = document.getElementById('loader-status');
    const s = document.getElementById('loader-substatus');
    if (m) m.textContent = main;
    if (s) s.textContent = sub;
  };

  const showError = (title, detail) => {
    root.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:14px;font-family:system-ui;background:#07070D;color:#F0F0FA;padding:20px">' +
        '<span style="font-size:2.2rem">⚠️</span>' +
        '<h3 style="font-size:1rem;font-weight:700">' + title + '</h3>' +
        '<pre style="font-size:.74rem;color:#F87171;background:rgba(248,113,113,.08);padding:10px 14px;border-radius:8px;max-width:580px;white-space:pre-wrap;text-align:left;font-family:Consolas,monospace;overflow:auto;max-height:50vh">' + String(detail).replace(/</g,'&lt;') + '</pre>' +
        '<button onclick="location.reload()" style="padding:9px 20px;background:#4ECDC4;color:#07070D;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:.82rem">Tentar novamente</button>' +
      '</div>';
  };

  // Captura erros globais que possam escapar do try/catch
  window.addEventListener('error', e => {
    if (root.querySelector('.init-loader')) {
      showError('Erro de runtime no app', (e.error?.stack || e.message || 'Erro desconhecido') + '\n\nLinha: ' + e.lineno + ' · Coluna: ' + e.colno);
    }
  });

  try {
    // ── ETAPA 1: Verifica libs ──
    setStatus('Verificando bibliotecas', '1 de 4');
    await new Promise(r => setTimeout(r, 30));

    const missing = [];
    if (!window.React)    missing.push('React');
    if (!window.ReactDOM) missing.push('ReactDOM');
    if (!window.Chart)    missing.push('Chart.js');
    if (!window.Swal)     missing.push('SweetAlert2');
    if (!window.Babel)    missing.push('Babel');
    if (missing.length) {
      throw new Error('Bibliotecas não carregadas: ' + missing.join(', ') + '\n\nVerifique se o CDN (unpkg.com / cdn.jsdelivr.net) não está bloqueado.');
    }

    // ── ETAPA 2: Busca o app.js ──
    setStatus('Buscando app.js', '2 de 4');
    let code;
    try {
      const res = await fetch('app.js?v=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status + ' ' + res.statusText);
      code = await res.text();
      if (!code.trim()) throw new Error('app.js está vazio');
    } catch (e) {
      throw new Error('Falha ao buscar app.js:\n' + e.message);
    }

    // ── ETAPA 3: Transpila JSX → JS ──
    setStatus('Compilando JSX', '3 de 4 · ' + Math.round(code.length / 1024) + ' KB');
    await new Promise(r => setTimeout(r, 30));

    let transformed;
    try {
      const result = Babel.transform(code, {
        presets: [['react', { runtime: 'classic' }]],
        sourceType: 'script',
        compact: true
      });
      transformed = result.code;
      if (!transformed) throw new Error('Babel retornou código vazio');
    } catch (e) {
      throw new Error('Erro de sintaxe ao compilar app.js:\n' + e.message);
    }

    // ── ETAPA 4: Executa ──
    setStatus('Iniciando aplicativo', '4 de 4');
    await new Promise(r => setTimeout(r, 30));

    try {
      // new Function() em vez de <script> injection — erros de runtime
      // propagam sincronicamente e são capturados pelo try/catch
      const runner = new Function(transformed);
      runner();
    } catch (e) {
      throw new Error('Erro de runtime ao executar app.js:\n' + (e.stack || e.message));
    }

    // ── Verifica se o React montou após 1.5s ──
    setTimeout(() => {
      if (document.querySelector('.init-loader')) {
        showError(
          'App carregou mas não renderizou',
          'O código de app.js foi executado, mas o React não substituiu o conteúdo de #root.\n\nProvavelmente algum erro silencioso em useEffect ou render. Abra o Console (F12) para ver detalhes.'
        );
      }
    }, 1500);

  } catch (e) {
    console.error('[Painel N3] Falha:', e);
    showError('Falha ao inicializar o painel', e.message);
  }
})();
</script>

</body>
</html>
